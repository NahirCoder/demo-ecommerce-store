<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="css/styles.css">

</head>

<body>

    <main class="login-container">

        <button id="back-home">

            🏠 Back to Home

        </button>

        <h1 id="business-name">

            Loading...

        </h1>

        <h2>

            Admin Panel Login

        </h2>

        <input
            id="email"
            type="email"
            placeholder="Email"
        >

        <input
            id="password"
            type="password"
            placeholder="Password"
        >

        <button id="show-password">

            Show Password

        </button>

        <button id="login-button">

            Login

        </button>

        <p id="login-error"></p>

    </main>

    <script src="js/login.js"></script>

</body>

</html>
